<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>需求排期工具</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f8; color: #333; min-height: 100vh; }

  header {
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: #fff;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    justify-content: space-between;
  }
  header .title-block {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  header h1 { font-size: 18px; font-weight: 700; letter-spacing: 0.5px; }
  header .subtitle { font-size: 12px; opacity: 0.8; }

  /* User area */
  header .user-area {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .user-info {
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(255,255,255,0.15);
    border-radius: 8px;
    padding: 4px 10px;
    font-size: 12px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .user-info:hover { background: rgba(255,255,255,0.25); }
  .user-avatar {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: #fff;
    color: #667eea;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
  }
  .switch-user-btn {
    background: rgba(255,255,255,0.15);
    border: none;
    color: #fff;
    padding: 4px 10px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 12px;
    transition: background 0.2s;
  }
  .switch-user-btn:hover { background: rgba(255,255,255,0.25); }
  .share-btn {
    background: rgba(255,255,255,0.15);
    border: none;
    color: #fff;
    padding: 4px 10px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 600;
    transition: background 0.2s;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .share-btn:hover { background: rgba(255,255,255,0.25); }

  .app-body {
    display: flex;
    height: calc(100vh - 54px);
    overflow: hidden;
  }

  /* ====== SIDEBAR ====== */
  .sidebar {
    width: 260px;
    min-width: 260px;
    background: #fff;
    border-right: 1px solid #e0e0e0;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .config-panel {
    padding: 12px;
    border-bottom: 1px solid #eee;
    background: #fafafa;
  }
  .config-panel h3 {
    font-size: 11px;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 8px;
  }
  .config-row {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 0;
  }
  .config-item {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .config-item label {
    font-size: 11px;
    color: #666;
    font-weight: 500;
  }
  .config-item input {
    padding: 5px 8px;
    border: 1px solid #ddd;
    border-radius: 6px;
    font-size: 12px;
    width: 100%;
    outline: none;
    transition: border-color 0.2s;
  }
  .config-item input:focus { border-color: #667eea; }

  .req-list-header {
    padding: 10px 12px 6px;
    font-size: 11px;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    border-bottom: 1px solid #eee;
    background: #fafafa;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .req-count { background: #667eea; color: #fff; border-radius: 10px; padding: 1px 6px; font-size: 10px; }

  .req-list {
    flex: 1;
    overflow-y: auto;
    padding: 6px 8px;
  }
  .req-list::-webkit-scrollbar { width: 4px; }
  .req-list::-webkit-scrollbar-thumb { background: #ddd; border-radius: 2px; }

  .req-item {
    background: #fff;
    border: 1px solid #e8e8e8;
    border-radius: 8px;
    padding: 8px 10px;
    margin-bottom: 6px;
    cursor: grab;
    user-select: none;
    transition: box-shadow 0.15s, transform 0.15s;
    position: relative;
  }
  .req-item:active { cursor: grabbing; }
  .req-item.dragging { opacity: 0.4; }
  .req-item.drag-over { border-color: #667eea; background: #f0f3ff; }
  .req-item.scheduled {
    border-left: 3px solid #22c55e;
  }
  .req-item:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.1); }

  .req-item-top {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 5px;
  }
  .drag-handle {
    color: #ccc;
    font-size: 14px;
    cursor: grab;
    flex-shrink: 0;
  }
  .req-name {
    flex: 1;
    font-size: 12px;
    font-weight: 500;
    line-height: 1.3;
    cursor: text;
    min-width: 0;
    word-break: break-all;
  }
  .req-name-input {
    flex: 1;
    font-size: 12px;
    font-weight: 500;
    border: 1px solid #667eea;
    border-radius: 4px;
    padding: 2px 4px;
    outline: none;
    min-width: 0;
  }
  .req-delete {
    background: none;
    border: none;
    color: #ccc;
    cursor: pointer;
    font-size: 14px;
    padding: 0 2px;
    flex-shrink: 0;
    line-height: 1;
    transition: color 0.2s;
  }
  .req-delete:hover { color: #ef4444; }

  .req-item-bottom {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
  }
  .pri-badge {
    font-size: 10px;
    font-weight: 700;
    padding: 1px 5px;
    border-radius: 4px;
    flex-shrink: 0;
  }
  .pri-P0 { background: #fee2e2; color: #dc2626; }
  .pri-P1 { background: #ffedd5; color: #ea580c; }
  .pri-P2 { background: #dcfce7; color: #16a34a; }
  .pri-P3 { background: #f3f4f6; color: #6b7280; }
  .pri-BIG { background: #ede9fe; color: #7c3aed; }

  .pri-select {
    font-size: 10px;
    border: 1px solid #ddd;
    border-radius: 4px;
    padding: 1px 3px;
    background: #fff;
    cursor: pointer;
    outline: none;
  }
  .pd-input {
    width: 44px;
    font-size: 11px;
    border: 1px solid #ddd;
    border-radius: 4px;
    padding: 2px 4px;
    text-align: center;
    outline: none;
  }
  .pd-input:focus { border-color: #667eea; }
  .pd-label { font-size: 10px; color: #999; }

  /* Link input */
  .req-link-row {
    display: flex;
    align-items: center;
    gap: 4px;
    margin-top: 4px;
  }
  .req-link-input {
    flex: 1;
    font-size: 10px;
    border: 1px solid #ddd;
    border-radius: 4px;
    padding: 2px 5px;
    outline: none;
    min-width: 0;
    color: #666;
  }
  .req-link-input:focus { border-color: #667eea; }
  .req-link-input.has-link { color: #667eea; }
  .req-link-icon {
    flex-shrink: 0;
    cursor: pointer;
    color: #667eea;
    font-size: 12px;
    display: none;
  }
  .req-link-icon.visible { display: block; }
  .req-link-icon.empty { color: #ccc; cursor: default; }

  .scheduled-date {
    font-size: 10px;
    color: #22c55e;
    margin-top: 3px;
    font-weight: 500;
  }

  .add-req-btn {
    margin: 8px;
    padding: 8px;
    background: none;
    border: 1.5px dashed #667eea;
    border-radius: 8px;
    color: #667eea;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    width: calc(100% - 16px);
    transition: background 0.2s;
  }
  .add-req-btn:hover { background: #f0f3ff; }

  /* ====== MAIN AREA ====== */
  .main-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-width: 0;
  }

  .stats-bar {
    background: #fff;
    border-bottom: 1px solid #e8e8e8;
    padding: 10px 16px;
    display: flex;
    gap: 16px;
    align-items: center;
    flex-wrap: wrap;
  }
  .stat-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-width: 80px;
  }
  .stat-value {
    font-size: 22px;
    font-weight: 700;
    color: #667eea;
    line-height: 1;
  }
  .stat-label {
    font-size: 10px;
    color: #999;
    margin-top: 2px;
    text-align: center;
    white-space: nowrap;
  }
  .stat-divider {
    width: 1px;
    height: 32px;
    background: #eee;
  }

  .action-bar {
    margin-left: auto;
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .action-btn {
    padding: 6px 12px;
    border-radius: 8px;
    border: none;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    white-space: nowrap;
  }
  .action-btn:hover { opacity: 0.85; transform: translateY(-1px); }
  .action-btn:active { transform: translateY(0); }
  .btn-auto { background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; }
  .btn-export { background: #f0f3ff; color: #667eea; border: 1px solid #c7d2fe; }
  .btn-clear { background: #fff5f5; color: #ef4444; border: 1px solid #fecaca; }

  /* Undo/Redo buttons */
  .btn-undo {
    padding: 6px 10px;
    border-radius: 8px;
    border: 1px solid #ddd;
    background: #fff;
    color: #666;
    cursor: pointer;
    font-size: 14px;
    transition: background 0.2s, color 0.2s;
    line-height: 1;
  }
  .btn-undo:hover:not(:disabled) { background: #f0f3ff; color: #667eea; }
  .btn-undo:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-redo {
    padding: 6px 10px;
    border-radius: 8px;
    border: 1px solid #ddd;
    background: #fff;
    color: #666;
    cursor: pointer;
    font-size: 14px;
    transition: background 0.2s, color 0.2s;
    line-height: 1;
  }
  .btn-redo:hover:not(:disabled) { background: #f0f3ff; color: #667eea; }
  .btn-redo:disabled { opacity: 0.4; cursor: not-allowed; }

  /* View-only mode indicator */
  .view-only-banner {
    background: #fef3c7;
    color: #92400e;
    padding: 6px 16px;
    font-size: 12px;
    text-align: center;
    font-weight: 600;
    display: none;
  }
  .view-only-banner.show { display: block; }

  .calendar-wrapper {
    flex: 1;
    overflow-y: auto;
    padding: 12px 16px;
  }
  .calendar-wrapper::-webkit-scrollbar { width: 6px; }
  .calendar-wrapper::-webkit-scrollbar-thumb { background: #ddd; border-radius: 3px; }

  .calendar-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .cal-nav-btn {
    background: #fff;
    border: 1px solid #ddd;
    border-radius: 8px;
    padding: 5px 12px;
    cursor: pointer;
    font-size: 14px;
    transition: background 0.2s;
  }
  .cal-nav-btn:hover { background: #f0f3ff; }
  .cal-title {
    font-size: 16px;
    font-weight: 700;
    color: #333;
  }

  .calendar-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 3px;
  }
  .cal-header-cell {
    text-align: center;
    font-size: 11px;
    font-weight: 600;
    color: #888;
    padding: 4px 0;
  }
  .cal-cell {
    background: #fff;
    border-radius: 8px;
    border: 1.5px solid transparent;
    min-height: 88px;
    padding: 4px;
    position: relative;
    transition: border-color 0.15s, background 0.15s;
    vertical-align: top;
  }
  .cal-cell.empty {
    background: transparent;
    border: none;
  }
  .cal-cell.holiday { background: #fff5f5; }
  .cal-cell.workday-holiday { background: #f0fdf4; }
  .cal-cell.weekend { background: #fafafa; }
  .cal-cell.past { opacity: 0.6; }
  .cal-cell.today { border-color: #667eea !important; }
  .cal-cell.drag-over-valid { border-color: #667eea; background: #f0f3ff; }
  .cal-cell.drag-over-invalid { border-color: #ef4444; background: #fff5f5; border-style: dashed; }

  .cal-date-num {
    font-size: 12px;
    font-weight: 600;
    color: #555;
    line-height: 1;
    margin-bottom: 2px;
  }
  .cal-cell.today .cal-date-num { color: #667eea; }

  .cal-holiday-tag {
    position: absolute;
    top: 3px;
    right: 4px;
    font-size: 9px;
    color: #ef4444;
    font-weight: 600;
    line-height: 1;
  }
  .cal-workday-tag {
    position: absolute;
    top: 3px;
    right: 4px;
    font-size: 9px;
    color: #16a34a;
    font-weight: 700;
    background: #dcfce7;
    border-radius: 3px;
    padding: 0 3px;
  }

  .cal-req-block {
    position: relative;
    border-radius: 4px;
    padding: 2px 5px;
    margin-top: 2px;
    font-size: 10px;
    font-weight: 600;
    color: #fff;
    cursor: default;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    line-height: 1.4;
    padding-right: 14px;
  }
  .cal-req-block .remove-btn {
    position: absolute;
    right: 2px;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(0,0,0,0.3);
    border: none;
    color: #fff;
    border-radius: 3px;
    width: 14px;
    height: 14px;
    font-size: 9px;
    line-height: 14px;
    text-align: center;
    cursor: pointer;
    display: none;
    padding: 0;
  }
  .cal-req-block:hover .remove-btn { display: block; }
  .block-P0 { background: #ef4444; }
  .block-P1 { background: #f97316; }
  .block-P2 { background: #22c55e; }
  .block-P3 { background: #9ca3af; }
  .block-BIG { background: #8b5cf6; }

  /* ====== MODAL ====== */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 1000;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.show { display: flex; }
  .modal-box {
    background: #fff;
    border-radius: 16px;
    padding: 24px;
    max-width: 560px;
    width: 90%;
    max-height: 80vh;
    overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }
  .modal-title {
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 16px;
    color: #333;
  }
  .modal-content {
    font-size: 13px;
    line-height: 1.8;
    color: #555;
    white-space: pre-wrap;
    font-family: 'SF Mono', 'Fira Code', monospace;
    background: #f8f9fa;
    border-radius: 8px;
    padding: 12px;
    max-height: 50vh;
    overflow-y: auto;
  }
  .modal-close {
    margin-top: 16px;
    padding: 8px 20px;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: #fff;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
  }

  /* Switch user modal */
  .modal-input {
    margin: 12px 0;
  }
  .modal-input input {
    width: 100%;
    padding: 10px;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 14px;
    outline: none;
  }
  .modal-input input:focus { border-color: #667eea; }
  .modal-actions {
    display: flex;
    gap: 8px;
    margin-top: 16px;
  }
  .modal-actions button {
    flex: 1;
    padding: 8px;
    border-radius: 8px;
    border: none;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }
  .modal-actions .confirm-btn {
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: #fff;
  }
  .modal-actions .cancel-btn {
    background: #f3f4f6;
    color: #666;
  }

  @media (max-width: 700px) {
    .app-body { flex-direction: column; height: auto; overflow: auto; }
    .sidebar { width: 100%; min-width: unset; height: auto; border-right: none; border-bottom: 1px solid #e0e0e0; }
    .main-area { height: auto; }
    .action-bar { margin-left: 0; }
    .stats-bar { flex-wrap: wrap; gap: 10px; }
    header .user-area { flex-wrap: wrap; gap: 4px; }
  }
</style>
</head>
<body>

<header>
  <div class="title-block">
    <div>
      <div class="h1" style="font-size:18px;font-weight:700;color:#fff;">📅 需求排期工具</div>
      <div class="subtitle" style="font-size:12px;opacity:0.8;color:#fff;">拖拽需求到日历格子即可排期</div>
    </div>
  </div>
  <div class="user-area">
    <div class="user-info" onclick="openSwitchUserModal()">
      <span class="user-avatar" id="userAvatar">?</span>
      <span id="userNameDisplay">加载中...</span>
    </div>
    <button class="switch-user-btn" onclick="openSwitchUserModal()">切换用户</button>
    <button class="share-btn" onclick="shareSchedule()">🔗 分享排期</button>
  </div>
</header>

<div class="view-only-banner" id="viewOnlyBanner">
  🔍 查看模式：你正在浏览他人分享的排期，数据每5秒自动同步更新
  <button style="margin-left:10px;padding:2px 8px;border-radius:6px;border:none;background:#667eea;color:#fff;cursor:pointer;font-size:11px;" onclick="copyShareLink()">复制链接</button>
</div>

<div class="app-body">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="config-panel">
      <h3>项目配置</h3>
      <div class="config-row">
        <div class="config-item">
          <label>开工日期</label>
          <input type="date" id="startDate" value="2026-05-06">
        </div>
        <div class="config-item">
          <label>大需求 DDL</label>
          <input type="date" id="bigDdl" value="2026-06-15">
        </div>
        <div class="config-item">
          <label>开发者</label>
          <input type="text" id="devName" value="晴姐" placeholder="开发者名称">
        </div>
      </div>
    </div>

    <div class="req-list-header">
      <span>需求列表</span>
      <span class="req-count" id="reqCount">0</span>
    </div>

    <div class="req-list" id="reqList"></div>

    <button class="add-req-btn" onclick="addRequirement()">+ 新增需求</button>
  </div>

  <!-- MAIN AREA -->
  <div class="main-area">
    <div class="stats-bar">
      <div class="stat-item">
        <div class="stat-value" id="statWorkdays">-</div>
        <div class="stat-label">可用工作日</div>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-item">
        <div class="stat-value" id="statScheduledPd">-</div>
        <div class="stat-label">已排小需求PD</div>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-item">
        <div class="stat-value" id="statBuffer">-</div>
        <div class="stat-label">剩余缓冲天</div>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-item">
        <div class="stat-value" id="statReqProgress">-</div>
        <div class="stat-label">已排/总需求</div>
      </div>
      <div class="action-bar">
        <button class="btn-undo" id="btnUndo" title="撤销 (Ctrl+Z)" onclick="undo()" disabled>↶</button>
        <button class="btn-redo" id="btnRedo" title="重做 (Ctrl+Y)" onclick="redo()" disabled>↷</button>
        <button class="action-btn btn-auto" onclick="autoSchedule()">⚡ 自动排期</button>
        <button class="action-btn btn-export" onclick="exportSchedule()">📋 导出</button>
        <button class="action-btn btn-clear" onclick="clearAll()">🗑 清空</button>
      </div>
    </div>

    <div class="calendar-wrapper">
      <div class="calendar-nav">
        <button class="cal-nav-btn" onclick="prevMonth()">‹ 上月</button>
        <div class="cal-title" id="calTitle"></div>
        <button class="cal-nav-btn" onclick="nextMonth()">下月 ›</button>
      </div>
      <div class="calendar-grid" id="calendarGrid"></div>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal-box">
    <div class="modal-title" id="modalTitle">导出排期</div>
    <div class="modal-content" id="modalContent"></div>
    <button class="modal-close" onclick="document.getElementById('modal').classList.remove('show')">关闭</button>
  </div>
</div>

<!-- Switch User Modal -->
<div class="modal-overlay" id="switchUserModal" onclick="closeSwitchUserModal(event)">
  <div class="modal-box">
    <div class="modal-title">切换用户</div>
    <div class="modal-content" style="white-space:pre-wrap;font-family:inherit;background:#fff;padding:0;">
      <div class="modal-input">
        <input type="text" id="newUserName" placeholder="输入用户名（如：晴姐）">
      </div>
    </div>
    <div class="modal-actions">
      <button class="cancel-btn" onclick="closeSwitchUserModal()">取消</button>

    </div>

<script>
// ============================================================
// USER SYSTEM
// ============================================================
const STORAGE_KEY_USER = 'scheduling_user';
const STORAGE_PREFIX_SCHEDULE = 'scheduling_schedule_';

let currentUserId = 'default';
let currentUserName = '晴姐';
let isViewMode = false; // true when viewing a shared schedule
const SHARE_KEY = 'scheduling_share_'; // { [shortId]: { data, updated } }

// Initialize user
function initUser() {
  // Check URL hash for share mode (#s= short ID)
  const hash = window.location.hash;
  if (hash && hash.startsWith('#s=')) {
    isViewMode = true;
    document.getElementById('viewOnlyBanner').classList.add('show');
    window.__shareShortId = hash.substring(3);
    loadSharedSchedule(hash.substring(3));
    // Auto-sync: reload from localStorage every 5 seconds
    setInterval(() => {
      const shareMap = JSON.parse(localStorage.getItem(SHARE_KEY) || '{}');
      const updated = shareMap[window.__shareShortId];
      if (updated && (!window.__shareTs || updated.updated > window.__shareTs)) {
        window.__shareTs = updated.updated;
        loadSharedSchedule(window.__shareShortId);
      }
    }, 5000);
    return;
  }

  // Load user from localStorage
  const stored = localStorage.getItem(STORAGE_KEY_USER);
  if (stored) {
    try {
      const user = JSON.parse(stored);
      currentUserId = user.id || 'default';
      currentUserName = user.name || '晴姐';
    } catch(e) {}
  }
  updateUserDisplay();
}

function updateUserDisplay() {
  const avatar = document.getElementById('userAvatar');
  const nameEl = document.getElementById('userNameDisplay');
  const initials = (currentUserName || '?').charAt(0).toUpperCase();
  avatar.textContent = initials;
  nameEl.textContent = currentUserName;
}

function switchUser() {
  const input = document.getElementById('newUserName');
  const name = input.value.trim();
  if (!name) return;

  currentUserName = name;
  currentUserId = name.replace(/\s+/g, '_').toLowerCase() || 'default';
  localStorage.setItem(STORAGE_KEY_USER, JSON.stringify({ id: currentUserId, name: currentUserName }));
  updateUserDisplay();
  closeSwitchUserModal();

  // Reload schedule for new user
  loadSchedule();
}

function openSwitchUserModal() {
  if (isViewMode) return; // cannot switch user in view mode
  document.getElementById('newUserName').value = currentUserName;
  document.getElementById('newUserName').focus();
  document.getElementById('switchUserModal').classList.add('show');
}

function closeSwitchUserModal(e) {
  if (e && e.target.id !== 'switchUserModal') return;
  document.getElementById('switchUserModal').classList.remove('show');
}

// ============================================================
// SHARE SYSTEM
// ============================================================
function shareSchedule() {
  if (isViewMode) return;

  const data = {
    requirements,
    startDate: document.getElementById('startDate').value,
    bigDdl: document.getElementById('bigDdl').value,
    devName: document.getElementById('devName').value,
    currentYear,
    currentMonth
  };

  const jsonStr = JSON.stringify(data);
  const base64 = btoa(unescape(encodeURIComponent(jsonStr)));
  const shareUrl = window.location.origin + window.location.pathname + '#share=' + base64;

  // Copy to clipboard
  navigator.clipboard.writeText(shareUrl).then(() => {
    alert('分享链接已复制到剪贴板！\n\n其他人打开链接即可查看排期结果。');
  }).catch(() => {
    // Fallback: show in modal
    document.getElementById('modalTitle').textContent = '🔗 分享排期链接';
    document.getElementById('modalContent').textContent = shareUrl;
    document.getElementById('modal').classList.add('show');
  });
}

function copyShareLink() {
  if (window.__shareShortId) {
    const url = window.location.origin + window.location.pathname + '#s=' + window.__shareShortId;
    navigator.clipboard.writeText(url).then(() => {
      alert('链接已复制到剪贴板！');
    }).catch(() => {});
  }
}

function loadSharedSchedule(shortId) {
  const shareMap = JSON.parse(localStorage.getItem(SHARE_KEY) || '{}');
  const entry = shareMap[shortId];
  if (!entry) {
    document.getElementById('viewOnlyBanner').textContent = '⚠️ 分享链接已失效或不存在';
    return;
  }

  try {
    const decoded = decodeURIComponent(escape(atob(entry.data)));
    const data = JSON.parse(decoded);

    if (data.requirements) requirements = data.requirements;
    if (data.startDate) document.getElementById('startDate').value = data.startDate;
    if (data.bigDdl) document.getElementById('bigDdl').value = data.bigDdl;
    if (data.devName) document.getElementById('devName').value = data.devName;
    if (data.currentYear) currentYear = data.currentYear;
    if (data.currentMonth !== undefined) currentMonth = data.currentMonth;

    // Disable editing in view mode
    document.querySelectorAll('input, button, select').forEach(el => {
      if (el.id !== 'btnUndo' && el.id !== 'btnRedo') {
        el.disabled = true;
      }
    });
    document.getElementById('btnUndo').disabled = true;
    document.getElementById('btnRedo').disabled = true;

    renderAll();
  } catch(e) {
    console.error('Failed to load shared schedule:', e);
    document.getElementById('viewOnlyBanner').textContent = '⚠️ 分享链接格式错误，无法加载';
  }
}

// ============================================================
// UNDO / REDO SYSTEM
// ============================================================
const MAX_HISTORY = 50;
let undoHistory = []; // array of snapshots
let redoHistory = []; // array of snapshots
let isRecording = true;

function captureState(label) {
  if (!isRecording) return;

  const snapshot = {
    label,
    requirements: JSON.parse(JSON.stringify(requirements)),
    startDate: document.getElementById('startDate').value,
    bigDdl: document.getElementById('bigDdl').value,
    devName: document.getElementById('devName').value,
    timestamp: Date.now()
  };

  undoHistory.push(snapshot);
  if (undoHistory.length > MAX_HISTORY) {
    undoHistory.shift();
  }
  redoHistory = []; // clear redo stack on new action

  updateUndoRedoButtons();
}

function undo() {
  if (undoHistory.length === 0 || isViewMode) return;

  // Push current state to redo
  const current = {
    requirements: JSON.parse(JSON.stringify(requirements)),
    startDate: document.getElementById('startDate').value,
    bigDdl: document.getElementById('bigDdl').value,
    devName: document.getElementById('devName').value
  };
  redoHistory.push(current);

  // Pop from undo
  const snapshot = undoHistory.pop();
  if (snapshot) {
    isRecording = false;
    requirements = JSON.parse(JSON.stringify(snapshot.requirements));
    document.getElementById('startDate').value = snapshot.startDate;
    document.getElementById('bigDdl').value = snapshot.bigDdl;
    document.getElementById('devName').value = snapshot.devName;
    isRecording = true;
    renderAll();
  }

  updateUndoRedoButtons();
}

function redo() {
  if (redoHistory.length === 0 || isViewMode) return;

  // Push current state to undo
  const current = {
    requirements: JSON.parse(JSON.stringify(requirements)),
    startDate: document.getElementById('startDate').value,
    bigDdl: document.getElementById('bigDdl').value,
    devName: document.getElementById('devName').value
  };
  undoHistory.push(current);

  // Pop from redo
  const snapshot = redoHistory.pop();
  if (snapshot) {
    isRecording = false;
    requirements = JSON.parse(JSON.stringify(snapshot.requirements));
    document.getElementById('startDate').value = snapshot.startDate;
    document.getElementById('bigDdl').value = snapshot.bigDdl;
    document.getElementById('devName').value = snapshot.devName;
    isRecording = true;
    renderAll();
  }

  updateUndoRedoButtons();
}

function updateUndoRedoButtons() {
  document.getElementById('btnUndo').disabled = undoHistory.length === 0 || isViewMode;
  document.getElementById('btnRedo').disabled = redoHistory.length === 0 || isViewMode;
}

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (isViewMode) return;
  // Ctrl+Z
  if (e.ctrlKey && e.key === 'z' && !e.shiftKey) {
    e.preventDefault();
    undo();
  }
  // Ctrl+Y
  if (e.ctrlKey && e.key === 'y') {
    e.preventDefault();
    redo();
  }
});

// ============================================================
// DATE UTILS
// ============================================================
function pad(n) { return String(n).padStart(2, '0'); }
function dateStr(d) { return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }

function isWorkday(dateS) {
  if (HOLIDAYS.has(dateS)) return false;
  if (WORKDAY_HOLIDAYS.has(dateS)) return true;
  const d = new Date(dateS + 'T00:00:00');
  const dow = d.getDay();
  return dow !== 0 && dow !== 6;
}

function getWorkdaysInRange(startS, endS) {
  const result = [];
  const cur = new Date(startS + 'T00:00:00');
  const end = new Date(endS + 'T00:00:00');
  while (cur <= end) {
    const s = dateStr(cur);
    if (isWorkday(s)) result.push(s);
    cur.setDate(cur.getDate() + 1);
  }
  return result;
}

function countWorkdays(startS, endS) {
  return getWorkdaysInRange(startS, endS).length;
}

function addWorkdays(startS, n) {
  const cur = new Date(startS + 'T00:00:00');
  let consumed = 0;
  let lastDate = startS;
  while (consumed < n) {
    const s = dateStr(cur);
    if (isWorkday(s)) {
      consumed++;
      lastDate = s;
    }
    if (consumed < n) cur.setDate(cur.getDate() + 1);
  }
  return lastDate;
}

function nextWorkday(afterS) {
  const d = new Date(afterS + 'T00:00:00');
  d.setDate(d.getDate() + 1);
  while (!isWorkday(dateStr(d))) d.setDate(d.getDate() + 1);
  return dateStr(d);
}

// ============================================================
// SCHEDULE COMPUTATION
// ============================================================
function computeSchedule() {
  const schedule = {};

  const smallReqs = requirements.filter(r => !r.isBig && r.startDate);
  const bigReq = requirements.find(r => r.isBig);

  smallReqs.forEach(req => {
    const dates = [];
    const cur = new Date(req.startDate + 'T00:00:00');
    let consumed = 0;
    const needed = req.pd;
    while (consumed < needed) {
      const s = dateStr(cur);
      if (isWorkday(s)) {
        dates.push(s);
        consumed++;
      }
      cur.setDate(cur.getDate() + 1);
    }
    schedule[req.id] = dates;
  });

  if (bigReq && bigReq.startDate) {
    const smallOccupied = new Set();
    Object.values(schedule).forEach(dates => dates.forEach(d => smallOccupied.add(d)));

    const dates = [];
    const cur = new Date(bigReq.startDate + 'T00:00:00');
    let consumed = 0;
    const needed = bigReq.pd;
    const maxIter = 500;
    let iter = 0;
    while (consumed < needed && iter < maxIter) {
      const s = dateStr(cur);
      if (isWorkday(s) && !smallOccupied.has(s)) {
        dates.push(s);
        consumed++;
      }
      cur.setDate(cur.getDate() + 1);
      iter++;
    }
    schedule[bigReq.id] = dates;
  }

  return schedule;
}

// ============================================================
// STATS

function updateStats() {
  const startS = document.getElementById('startDate').value;
  const ddlS = document.getElementById('bigDdl').value;

  if (startS && ddlS) {
    const wds = countWorkdays(startS, ddlS);
    document.getElementById('statWorkdays').textContent = wds;

    const schedule = computeSchedule();
    const smallReqs = requirements.filter(r => !r.isBig && r.startDate);
    let totalPd = 0;
    smallReqs.forEach(r => { totalPd += r.pd; });
    document.getElementById('statScheduledPd').textContent = totalPd % 1 === 0 ? totalPd : totalPd.toFixed(1);

    const buffer = wds - totalPd;
    document.getElementById('statBuffer').textContent = buffer % 1 === 0 ? buffer : buffer.toFixed(1);

    const totalReqs = requirements.filter(r => !r.isBig).length;
    const scheduledReqs = requirements.filter(r => !r.isBig && r.startDate).length;
    document.getElementById('statReqProgress').textContent = `${scheduledReqs}/${totalReqs}`;
  } else {
    document.getElementById('statWorkdays').textContent = '-';
    document.getElementById('statScheduledPd').textContent = '-';
    document.getElementById('statBuffer').textContent = '-';
    document.getElementById('statReqProgress').textContent = '-';
  }

  document.getElementById('reqCount').textContent = requirements.length;
}

      setTimeout(() => item.classList.add('dragging'), 0);

      item.classList.remove('dragging');

    item.addEventListener('dragstart', e => {
      dragSrcListId = req.id;
      e.dataTransfer.setData('list-reorder', req.id);

function updateReqLink(reqId, value) {

function openReqLink(reqId) {

  if (req && req.link) {
    window.open(req.link, '_blank');
  }
}

function startEditName(el, reqId) {
  const req = requirements.find(r => r.id === reqId);
  if (!req) return;
  const input = document.createElement('input');
  input.className = 'req-name-input';
  input.value = req.name;
  el.replaceWith(input);
  input.focus();
  input.select();
  const finish = () => {
    req.name = input.value.trim() || req.name;
    captureState('编辑需求名称 ' + req.name);
    renderAll();
  };
  input.addEventListener('blur', finish);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') input.blur(); });
}

function reorderRequirements(fromId, toId) {
  const fromIdx = requirements.findIndex(r => r.id === fromId);
  const toIdx = requirements.findIndex(r => r.id === toId);
  if (fromIdx === -1 || toIdx === -1) return;
  const [item] = requirements.splice(fromIdx, 1);
  requirements.splice(toIdx, 0, item);
  captureState('重新排序需求');
  renderAll();
}

function deleteReq(id) {
  if (isViewMode) return;
  const idx = requirements.findIndex(r => r.id === id);
  if (idx !== -1) {
    const req = requirements[idx];
    requirements.splice(idx, 1);
    captureState('删除需求 ' + req.name);
    renderAll();
  }
}

function changePri(id, val) {
  if (isViewMode) return;
  const req = requirements.find(r => r.id === id);
  if (req) {
    req.pri = val;
    req.isBig = (val === 'BIG');
    captureState('修改需求优先级 ' + req.name);
    renderAll();
  }
}

function changePd(id, val) {
  if (isViewMode) return;

    req.pd = parseFloat(val) || 1;
    captureState('修改需求PD ' + req.name);
    renderAll();

function addRequirement() {

  const newId = 'req_' + Date.now();
  requirements.push({
    id: newId,
    name: '新需求',
    pd: 1,
    pri: 'P2',
    note: '',
    isBig: false,
    startDate: null,
    link: ''
  });
  captureState('新增需求');
  renderAll();
  const list = document.getElementById('reqList');
  list.scrollTop = list.scrollHeight;
}

// ============================================================
// RENDER CALENDAR
// ============================================================
function renderCalendar() {
  const title = document.getElementById('calTitle');
  const monthNames = ['一月','二月','三月','四月','五月','六月',
                      '七月','八月','九月','十月','十一月','十二月'];
  title.textContent = `${currentYear}年 ${monthNames[currentMonth]}`;

  const grid = document.getElementById('calendarGrid');
  grid.innerHTML = '';

  const dayNames = ['日','一','二','三','四','五','六'];
  dayNames.forEach(d => {
    const cell = document.createElement('div');
    cell.className = 'cal-header-cell';
    cell.textContent = d;
    grid.appendChild(cell);
  });

  const firstDay = new Date(currentYear, currentMonth, 1);
  const startDow = firstDay.getDay();
  const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
  const today = dateStr(new Date());
  const schedule = computeSchedule();

  const dateReqMap = {};
  requirements.forEach(req => {
    const dates = schedule[req.id] || [];
    dates.forEach(d => {
      if (!dateReqMap[d]) dateReqMap[d] = [];
      dateReqMap[d].push(req);
    });
  });

  for (let i = 0; i < startDow; i++) {
    const cell = document.createElement('div');
    cell.className = 'cal-cell empty';
    grid.appendChild(cell);
  }

  for (let day = 1; day <= daysInMonth; day++) {
    const ds = `${currentYear}-${pad(currentMonth+1)}-${pad(day)}`;
    const isHoliday = HOLIDAYS.has(ds);
    const isWorkdayHoliday = WORKDAY_HOLIDAYS.has(ds);
    const d = new Date(ds + 'T00:00:00');
    const dow = d.getDay();
    const isWeekend = (dow === 0 || dow === 6);
    const workday = isWorkday(ds);
    const isToday = ds === today;

    const cell = document.createElement('div');
    let cls = 'cal-cell';
    if (isHoliday) cls += ' holiday';
    else if (isWorkdayHoliday) cls += ' workday-holiday';
    else if (isWeekend) cls += ' weekend';
    if (isToday) cls += ' today';

    cell.className = cls;
    cell.dataset.date = ds;

    const dateNum = document.createElement('div');
    dateNum.className = 'cal-date-num';
    dateNum.textContent = day;
    cell.appendChild(dateNum);

    if (isHoliday && HOLIDAY_NAMES[ds]) {
      const tag = document.createElement('div');
      tag.className = 'cal-holiday-tag';
      tag.textContent = HOLIDAY_NAMES[ds];
      cell.appendChild(tag);
    } else if (isWorkdayHoliday) {
      const tag = document.createElement('div');
      tag.className = 'cal-workday-tag';
      tag.textContent = '班';
      cell.appendChild(tag);
    }

    const reqs = dateReqMap[ds] || [];
    reqs.forEach(req => {
      const block = document.createElement('div');
      block.className = `cal-req-block block-${req.pri}`;
      block.title = req.name;
      block.innerHTML = `${req.name}<button class="remove-btn" onclick="unscheduleReq('${req.id}')">×</button>`;
      cell.appendChild(block);
    });

    if (workday) {
      cell.addEventListener('dragover', e => {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'copy';
        cell.classList.add('drag-over-valid');
      });
      cell.addEventListener('dragleave', () => {
        cell.classList.remove('drag-over-valid');
      });
      cell.addEventListener('drop', e => {
        e.preventDefault();
        cell.classList.remove('drag-over-valid');
        const reqId = dragSrcReqId || e.dataTransfer.getData('text/plain');
        if (reqId) {
          scheduleReq(reqId, ds);
        }
      });
    } else {
      cell.addEventListener('dragover', e => {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'none';
        cell.classList.add('drag-over-invalid');
      });
      cell.addEventListener('dragleave', () => {
        cell.classList.remove('drag-over-invalid');
      });
      cell.addEventListener('drop', e => {
        e.preventDefault();
        cell.classList.remove('drag-over-invalid');
      });
    }

    grid.appendChild(cell);
  }
}

function scheduleReq(reqId, dateS) {
  if (isViewMode) return;
  const req = requirements.find(r => r.id === reqId);
  if (!req) return;
  req.startDate = dateS;
  captureState('排期需求 ' + req.name);
  renderAll();
}

function unscheduleReq(reqId) {
  if (isViewMode) return;
  const req = requirements.find(r => r.id === reqId);
  if (req) {
    const oldDate = req.startDate;
    req.startDate = null;
    captureState('取消排期 ' + req.name);
    renderAll();
  }
}

// ============================================================
// AUTO SCHEDULE
// ============================================================
function autoSchedule() {
  if (isViewMode) return;
  const startS = document.getElementById('startDate').value;
  if (!startS) { alert('请先设置开工日期'); return; }

  requirements.forEach(r => { r.startDate = null; });

  const smallReqs = requirements.filter(r => !r.isBig);
  let cursor = startS;
  const d = new Date(startS + 'T00:00:00');
  while (!isWorkday(dateStr(d))) d.setDate(d.getDate() + 1);
  cursor = dateStr(d);

  smallReqs.forEach(req => {
    req.startDate = cursor;
    const datesConsumed = [];
    const d2 = new Date(cursor + 'T00:00:00');
    let consumed = 0;
    while (consumed < req.pd) {
      const s = dateStr(d2);
      if (isWorkday(s)) {
        datesConsumed.push(s);
        consumed++;
      }
      d2.setDate(d2.getDate() + 1);
    }
    while (!isWorkday(dateStr(d2))) d2.setDate(d2.getDate() + 1);
    cursor = dateStr(d2);
  });

  const bigReq = requirements.find(r => r.isBig);
  if (bigReq) {
    bigReq.startDate = startS;
  }

  captureState('自动排期');
  renderAll();
}

// ============================================================
// EXPORT
// ============================================================
function exportSchedule() {
  const startS = document.getElementById('startDate').value;
  const ddlS = document.getElementById('bigDdl').value;
  const devName = document.getElementById('devName').value;
  const schedule = computeSchedule();

  let text = `📅 需求排期导出\n`;
  text += `开发者：${devName || '-'}\n`;
  text += `开工日期：${startS || '-'}\n`;
  text += `大需求 DDL：${ddlS || '-'}\n`;
  text += `\n`;

  requirements.forEach(req => {
    const dates = schedule[req.id] || [];
    const end = dates.length > 0 ? dates[dates.length - 1] : null;
    const statusMark = req.startDate ? '✅' : '⏳';
    text += `${statusMark} [${req.pri}] ${req.name}\n`;
    text += `   PD: ${req.pd}`;
    if (req.startDate) {
      text += `  开始: ${req.startDate}`;
      if (end && end !== req.startDate) text += `  结束: ${end}`;
    } else {
      text += `  （未排期）`;
    }
    if (req.note) text += `  备注: ${req.note}`;
    if (req.link) text += `  链接: ${req.link}`;
    text += `\n`;
  });

  text += `\n--- 统计 ---\n`;
  if (startS && ddlS) {
    const wds = countWorkdays(startS, ddlS);
    const smallReqs = requirements.filter(r => !r.isBig && r.startDate);
    let totalPd = 0;
    smallReqs.forEach(r => totalPd += r.pd);
    text += `可用工作日：${wds}\n`;
    text += `已排小需求 PD：${totalPd}\n`;
    text += `剩余缓冲天：${wds - totalPd}\n`;
  }

  document.getElementById('modalTitle').textContent = '📋 排期导出';
  document.getElementById('modalContent').textContent = text;
  document.getElementById('modal').classList.add('show');
}

function closeModal(e) {
  if (e.target.id === 'modal') {
    document.getElementById('modal').classList.remove('show');
  }
}

// ============================================================
// CLEAR
// ============================================================
function clearAll() {
  if (isViewMode) return;
  if (!confirm('确认清空所有排期？')) return;
  requirements.forEach(r => { r.startDate = null; });
  captureState('清空排期');
  renderAll();
}

// ============================================================
// MONTH NAV
// ============================================================
function prevMonth() {
  currentMonth--;
  if (currentMonth < 0) { currentMonth = 11; currentYear--; }
  renderCalendar();
}

function nextMonth() {
  currentMonth++;
  if (currentMonth > 11) { currentMonth = 0; currentYear++; }
  renderCalendar();
}

// ============================================================
// CONFIG CHANGE HANDLERS (with undo)
// ============================================================
function handleConfigChange() {
  if (isViewMode) return;
  captureState('修改配置');
  renderAll();
}

document.getElementById('startDate').addEventListener('change', handleConfigChange);
document.getElementById('bigDdl').addEventListener('change', handleConfigChange);
document.getElementById('devName').addEventListener('change', handleConfigChange);

// ============================================================
// INIT & BINDINGS
// ============================================================
function renderAll() {
  renderSidebar();
  renderCalendar();
}

// Initial render
initUser();
loadSchedule();
</script>
